# Production Configuration
# Maximum security and reliability for production deployment

version: "1.0"
environment: "production"

extends: "default.yaml"

# Network Configuration - Maximum security
network:
  protocol: "RAQT"
  quantum_channel:
    enabled: true
    error_correction: true
    entanglement_verification: true
  classical_channel:
    enabled: true
    encryption: "AES-256-GCM"
    authentication: "mutual"

# PUF Configuration - Maximum security and reliability
puf:
  sram:
    enabled: true
    cell_count: 4096  # Increased for higher entropy
    response_bits: 512  # Increased
    noise_level: 0.15
    temperature_sensitivity: 0.02
  
  ro:
    enabled: true
    oscillator_pairs: 256  # Increased
    response_bits: 256  # Increased
    noise_level: 0.08
    frequency_range: [100000000, 150000000]
    measurement_time: 0.001
  
  arbiter:
    enabled: true
    delay_stages: 128  # Increased
    response_bits: 128  # Increased
    noise_level: 0.11
    delay_variation: 1.0e-12
    base_delay: 10.0e-12
  
  fusion:
    enabled: true
    algorithm: "confidence_based"  # Most robust algorithm
    weights:
      sram: 0.4
      ro: 0.35
      arbiter: 0.25
  
  fuzzy_extractor:
    enabled: true
    error_correction: "BCH"
    code_params:
      n: 255
      k: 131
      t: 18

# PQC - Maximum security level
pqc:
  dilithium:
    enabled: true
    security_level: 5  # NIST Level 5 (256-bit quantum security)
    mode: "Dilithium5"
  
  mlkem:
    enabled: true
    security_level: 5  # ML-KEM-1024
    mode: "ML-KEM-1024"
  
  hkdf:
    enabled: true
    hash_algorithm: "SHA3-512"  # Stronger hash
    salt_length: 64  # Longer salt
    info: "RAQT-PUF-PQC-PROD-v1.0"

# Encryption - Maximum security
encryption:
  algorithm: "AES-256-GCM"
  key_size: 256
  nonce_size: 96
  tag_size: 128
  key_rotation_interval: 1800  # 30 minutes (frequent rotation)

# Authentication - Strict settings
authentication:
  method: "mutual"
  zkp:
    enabled: true
    protocol: "pedersen"  # More secure protocol
    challenge_size: 512  # Larger challenge
  timeout: 15  # Shorter timeout

# Security Monitoring - Maximum vigilance
monitoring:
  tamper_detection:
    enabled: true
    check_interval: 0.5  # Frequent checks
    threshold: 0.15  # Strict threshold
  
  clone_detection:
    enabled: true
    methods:  # All methods enabled
      - "inter_hamming"
      - "intra_hamming"
      - "entropy"
      - "autocorrelation"
      - "chi_square"
    thresholds:
      inter_hd: 0.50
      intra_hd: 0.12  # Stricter
      entropy: 7.5  # Higher requirement
  
  timing_protection:
    enabled: true
    constant_time_ops: true
    blinding: true
    timing_analysis: false  # Disabled in production

# Logging - Production level
logging:
  level: "WARNING"  # Only warnings and errors
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/raqt_prod.log"
  max_size: 104857600  # 100 MB
  backup_count: 10
  console: false  # No console output in production

# Performance - Production optimized
performance:
  max_concurrent_connections: 1000
  buffer_size: 16384
  timeout: 15
  retry_attempts: 3
  retry_delay: 0.5

# Experimental Features - All disabled in production
experimental:
  quantum_key_distribution: false
  hardware_acceleration: false
  distributed_puf: false
  adaptive_noise: false

# Production-specific settings
production:
  # High availability
  ha:
    enabled: true
    failover_timeout: 5
    health_check_interval: 10
  
  # Rate limiting
  rate_limiting:
    enabled: true
    max_requests_per_minute: 1000
    burst_size: 100
  
  # Audit logging
  audit:
    enabled: true
    log_all_operations: true
    retention_days: 90
  
  # Backup
  backup:
    enabled: true
    interval: 3600  # Hourly
    retention_count: 24

